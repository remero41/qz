# Compila el instalador .pkg de QZ Tray para macOS (Intel + Apple Silicon) en
# un runner macOS de GitHub Actions, con los certificados de 100 anos de POS Printer
# (CN=*.this-repo.com) para que QZ imprima sin dialogo de confianza.
#
# Por que existe: el .pkg de Mac NO se puede compilar desde Linux (necesita
# pkgbuild/productbuild/codesign, exclusivos de macOS). Este workflow es la unica
# via sin tener un Mac a mano.
#
# Disparo MANUAL (workflow_dispatch): no corre en cada push, para no gastar
# minutos de runner macOS ni exponer los certificados sin querer.
#
# SECRETS necesarios (Settings -> Secrets and variables -> Actions):
#   QZ_CERT_PEM      contenido completo de cert.pem     (<ruta-a-los-certs>/cert.pem)
#   QZ_KEY_PEM       contenido completo de key.pem      (clave privada del parque)
#   QZ_OVERRIDE_CRT  contenido completo de override.crt
# Se cargan como texto (multilinea) tal cual estan los .pem.

name: build-mac

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Adjuntar los .pkg a una Release (tag)'
        required: false
        default: ''

jobs:
  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]   # Intel + Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'liberica'

      # Reconstruir los certificados desde Secrets en la raiz del arbol (donde
      # los espera ant con -Dauthcert.use="cert.pem").
      - name: Restaurar certificados desde Secrets
        env:
          QZ_CERT_PEM: ${{ secrets.QZ_CERT_PEM }}
          QZ_KEY_PEM: ${{ secrets.QZ_KEY_PEM }}
          QZ_OVERRIDE_CRT: ${{ secrets.QZ_OVERRIDE_CRT }}
        run: |
          if [ -z "$QZ_CERT_PEM" ] || [ -z "$QZ_KEY_PEM" ] || [ -z "$QZ_OVERRIDE_CRT" ]; then
            echo "::error::Faltan Secrets QZ_CERT_PEM / QZ_KEY_PEM / QZ_OVERRIDE_CRT. Cargalos en Settings -> Secrets -> Actions."
            exit 1
          fi
          printf '%s' "$QZ_CERT_PEM"     > cert.pem
          printf '%s' "$QZ_KEY_PEM"      > key.pem
          printf '%s' "$QZ_OVERRIDE_CRT" > override.crt
          chmod 600 key.pem
          # Sanidad: que sean PEM validos (sin volcar contenido en el log)
          openssl x509 -in cert.pem -noout -subject 2>/dev/null | grep -q 'this-repo.com' \
            || { echo "::error::cert.pem no parece el certificado de POS Printer"; exit 1; }
          echo "Certificados restaurados."

      # Compilar el .pkg con los certificados + el provisioning versionado en el repo.
      # En Mac el provision.json no tiene pasos 'mac' (el arranque es LaunchAgent
      # nativo), asi que el .pkg sale con arranque nativo y sin el watchdog de Windows.
      - name: Compilar .pkg (${{ matrix.arch }})
        run: |
          ant -Dtarget.arch=${{ matrix.arch }} pkgbuild \
              -Dauthcert.use="cert.pem" \
              -Dprovision.file="provision-src/provision.json"
          ls -la out/*.pkg

      # No dejar la clave privada en el workspace mas de lo necesario
      - name: Borrar certificados del workspace
        if: always()
        run: rm -f cert.pem key.pem override.crt

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: qz-tray-macos-${{ matrix.arch }}
          path: out/qz-tray-*.pkg
          if-no-files-found: error

      # Opcional: si se paso un tag en 'release', adjuntar el .pkg a esa Release.
      - name: Adjuntar a Release
        if: ${{ inputs.release != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release }}
          files: out/qz-tray-*.pkg
