# Compila el instalador .pkg de QZ Tray para macOS (Intel + Apple Silicon) en
# un runner macOS de GitHub Actions, con un juego de certificados propios para que
# QZ imprima sin dialogo de confianza.
#
# Por que existe: el .pkg de Mac NO se puede compilar desde Linux (necesita
# pkgbuild/productbuild/codesign, exclusivos de macOS). Este workflow es la unica
# via sin tener un Mac a mano.
#
# IMPORTANTE: este repo NO contiene el fuente de QZ, solo binarios (qz.exe/qz.run)
# y el provisioning (provision-src/). El fuente vive en qzind/tray. El workflow,
# por tanto: (1) checkout de ESTE repo para coger provision-src/, (2) clona
# qzind/tray al pin exacto que usamos, (3) copia dentro el provisioning + los certs
# desde Secrets, (4) compila alli con ant pkgbuild.
#
# Disparo MANUAL (workflow_dispatch): no corre en cada push, para no gastar
# minutos de runner macOS ni exponer los certificados sin querer.
#
# SECRETS necesarios (Settings -> Secrets and variables -> Actions):
#   QZ_CERT_PEM      contenido completo de cert.pem
#   QZ_KEY_PEM       contenido completo de key.pem (clave privada del parque)
#   QZ_OVERRIDE_CRT  contenido completo de override.crt
# VARIABLE opcional (Settings -> Variables): QZ_CERT_CN_MATCH = texto que debe
#   contener el subject del cert (comprobacion de sanidad). Si no se define, se omite.

name: build-mac

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Adjuntar los .pkg a una Release (tag)'
        required: false
        default: ''
      publicar:
        description: 'Commitear qz-intel.pkg / qz-arm.pkg a LFS de main (lo que descarga el TPV)'
        type: boolean
        required: false
        default: true

# El paso "Publicar en LFS de main" commitea el binario al repo.
permissions:
  contents: write

env:
  # Fuente de QZ y commit EXACTO con el que se compila el parque (v2.2.6 + 24 commits).
  QZ_SOURCE_REPO: https://github.com/qzind/tray
  QZ_SOURCE_REF: 46e404e4d50d92b84ee3a817d29ce0f5225907bb

jobs:
  macos:
    runs-on: macos-latest
    strategy:
      # pkg: nombre FIJO con el que el TPV descarga cada build
      # (zq/printer-modal.js -> QZ_DL['mac-intel'] / QZ_DL['mac-arm']). Va en la
      # matriz, y no en una env escrita por un paso, para que sea estatico: asi no
      # depende del orden de los pasos ni puede llegar vacio a upload-artifact.
      matrix:
        include:
          - arch: x86_64    # Intel
            pkg: qz-intel.pkg
          - arch: aarch64   # Apple Silicon
            pkg: qz-arm.pkg
    steps:
      # 1) Checkout de ESTE repo para coger provision-src/.
      #    Se coloca en subcarpeta 'this-repo' para no chocar con el fuente de QZ.
      - uses: actions/checkout@v4
        with:
          path: this-repo

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'liberica'

      # 2) Clonar el fuente de QZ al pin exacto (qzind/tray @ 46e404e).
      - name: Clonar fuente qzind/tray (pin exacto)
        run: |
          git clone --filter=blob:none "$QZ_SOURCE_REPO" tray
          cd tray
          git checkout "$QZ_SOURCE_REF"
          echo "Fuente en $(git rev-parse --short HEAD)"

      # 2b) Aplicar el parche de device path USB Windows (aditivo; el código nuevo
      #     es Windows-only en runtime, así que compila igual en el build de Mac).
      - name: Aplicar parche device path Windows
        working-directory: tray
        run: |
          git apply --check ../this-repo/patches/0001-usb-details-windows-devicepath.patch
          git apply        ../this-repo/patches/0001-usb-details-windows-devicepath.patch
          echo "Parche device path aplicado."

      # 3) Copiar el provisioning versionado en nuestro repo dentro del arbol tray.
      - name: Colocar provisioning
        run: |
          mkdir -p tray/provision
          cp this-repo/provision-src/*.ps1 this-repo/provision-src/*.sh this-repo/provision-src/provision.json tray/provision/
          ls -la tray/provision/

      # 4) Restaurar certificados desde Secrets en la raiz del arbol tray
      #    (donde los espera ant con -Dauthcert.use="cert.pem").
      - name: Restaurar certificados desde Secrets
        env:
          QZ_CERT_PEM: ${{ secrets.QZ_CERT_PEM }}
          QZ_KEY_PEM: ${{ secrets.QZ_KEY_PEM }}
          QZ_OVERRIDE_CRT: ${{ secrets.QZ_OVERRIDE_CRT }}
          QZ_CERT_CN_MATCH: ${{ vars.QZ_CERT_CN_MATCH }}
        run: |
          if [ -z "$QZ_CERT_PEM" ] || [ -z "$QZ_KEY_PEM" ] || [ -z "$QZ_OVERRIDE_CRT" ]; then
            echo "::error::Faltan Secrets QZ_CERT_PEM / QZ_KEY_PEM / QZ_OVERRIDE_CRT."
            exit 1
          fi
          printf '%s' "$QZ_CERT_PEM"     > tray/cert.pem
          printf '%s' "$QZ_KEY_PEM"      > tray/key.pem
          printf '%s' "$QZ_OVERRIDE_CRT" > tray/override.crt
          chmod 600 tray/key.pem
          # Comprobacion de sanidad opcional: si se define la variable QZ_CERT_CN_MATCH,
          # el subject del cert debe contenerla (asi el CN no queda hardcodeado aqui).
          if [ -n "$QZ_CERT_CN_MATCH" ]; then
            openssl x509 -in tray/cert.pem -noout -subject 2>/dev/null | grep -q "$QZ_CERT_CN_MATCH" \
              || { echo "::error::cert.pem no coincide con QZ_CERT_CN_MATCH."; exit 1; }
          fi
          echo "Certificados restaurados."

      # 5) Compilar el .pkg. En Mac el provision.json no tiene pasos 'mac' (el
      #    arranque es LaunchAgent nativo), asi que el .pkg sale con arranque
      #    nativo y sin el watchdog de Windows.
      - name: Compilar .pkg (${{ matrix.arch }})
        working-directory: tray
        run: |
          ant -Dtarget.arch=${{ matrix.arch }} pkgbuild \
              -Dauthcert.use="cert.pem" \
              -Dprovision.file="provision/provision.json"
          ls -la out/*.pkg

      # Nombre FIJO por arquitectura: pkgbuild genera qz-tray-X.Y.Z.pkg, pero el
      # TPV descarga qz-arm.pkg / qz-intel.pkg (zq/printer-modal.js -> QZ_DL).
      # Sin este renombrado, lo publicado no casaria con lo que el modal pide.
      - name: Renombrar .pkg al nombre que descarga el TPV
        working-directory: tray
        env:
          DEST: ${{ matrix.pkg }}
        run: |
          set -euo pipefail
          SRC=$(ls out/*.pkg | head -1)
          [ -n "$SRC" ] || { echo "::error::no se genero ningun .pkg"; exit 1; }
          [ "$SRC" = "out/$DEST" ] || mv "$SRC" "out/$DEST"
          ls -la "out/$DEST"

      # No dejar la clave privada en el workspace mas de lo necesario
      - name: Borrar certificados del workspace
        if: always()
        run: rm -f tray/cert.pem tray/key.pem tray/override.crt

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: qz-tray-macos-${{ matrix.arch }}
          path: tray/out/${{ matrix.pkg }}
          if-no-files-found: error

      - name: Adjuntar a Release
        if: ${{ inputs.release != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release }}
          files: tray/out/${{ matrix.pkg }}

      # PUBLICACION: commitea el .pkg al LFS de main, de donde descarga el TPV.
      # Hoy main NO tiene ningun .pkg, asi que el modal ofrece a los Mac una URL
      # que da 404. Ver la cabecera de build-win.yaml para el contexto completo.
      #
      # CARRERA: los dos jobs de la matriz (intel + arm) publican en main a la vez
      # y tocan ficheros DISTINTOS, pero comparten rama -> el segundo push es
      # rechazado por non-fast-forward. Por eso se reintenta con pull --rebase.
      - name: Publicar en LFS de main
        if: ${{ inputs.publicar }}
        env:
          PKG_NAME: ${{ matrix.pkg }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" publish
          cd publish
          git lfs install --local

          cp "../tray/out/${PKG_NAME}" "${PKG_NAME}"

          if git diff --quiet -- "${PKG_NAME}"; then
            echo "${PKG_NAME} no ha cambiado respecto a main: nada que publicar."
            exit 0
          fi

          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add "${PKG_NAME}"

          # DEBE quedar como puntero LFS, o meteriamos el .pkg entero en el arbol.
          if ! git show ":${PKG_NAME}" | head -c 40 | grep -q 'version https://git-lfs'; then
            echo "::error::${PKG_NAME} NO quedo como puntero LFS. Abortado."
            exit 1
          fi

          # Un -m por parrafo (ver build-win.yaml).
          git commit \
            -m "build(qz): publica ${PKG_NAME} compilado en CI desde ${GITHUB_SHA:0:7}" \
            -m "Binario que descarga el TPV (LFS de main). Generado por build-mac.yaml (${{ matrix.arch }})."

          # Reintento por la carrera entre los dos jobs de la matriz.
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "${PKG_NAME} publicado en LFS de main."
              exit 0
            fi
            echo "push rechazado (intento $i), rebase y reintento..."
            git pull --rebase origin main
          done
          echo "::error::no se pudo publicar ${PKG_NAME} tras 5 intentos."
          exit 1
