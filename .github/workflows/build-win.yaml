# Compila el instalador .exe de QZ Tray para Windows en un runner windows-latest
# de GitHub Actions, aplicando los CUATRO parches (patches/0001..0004): device path
# USB (0001 win / 0002 linux) y estado VIVO de la cola (0003 win workOffline /
# 0004 linux printerState+stateReasons). Todos son aditivos y solo se activan bajo
# su SO en runtime, asi que los tres workflows aplican los mismos cuatro y el
# binario no diverge entre plataformas.
#
# Por que existe: el .exe del repo se compilaba a mano en una maquina Windows.
# Este workflow lo hace reproducible en CI para poder generar el .exe PARCHEADO
# (con el devicePath usbprint real que consume el TPV) sin depender de un Windows
# a mano. Espeja a build-mac.yaml pero con target `nsis` (NSIS) en vez de `pkgbuild`.
#
# IMPORTANTE: este repo NO contiene el fuente de QZ, solo binarios y el
# provisioning (provision-src/). El fuente vive en qzind/tray. El workflow:
#   (1) checkout de ESTE repo (provision-src/ + patches/),
#   (2) clona qzind/tray al pin exacto (46e404e),
#   (3) aplica el parche device path,
#   (4) copia el provisioning + (opcional) los certs desde Secrets,
#   (5) compila con `ant nsis`.
#
# Disparo: se lanza en cada push de 'main' y de la rama del parche, y ademas
# MANUALMENTE (workflow_dispatch).
#
# PUBLICACION -> LFS de main (2026-07-22). El TPV descarga el instalador de
#   https://media.githubusercontent.com/media/remero41/qz/main/qz.exe
# (LFS de main), NO de Releases. Antes este workflow solo subia el .exe como
# artefacto / a una Release, asi que el binario de main se quedaba congelado en
# el ultimo build MANUAL: el 16-jul (5ec0d43), ANTERIOR al merge del parche USB
# (b4a90d9, 21-jul). Resultado medido en Windows real el 22-jul: el QZ instalado
# desde el modal NO emitia devicePath ni printerClass en usb.listDevices, y como
# en Windows el bus da serial:"" (el nº de serie va DENTRO del devicePath), la
# identidad aprobada no casaba y se perdia el USB directo -> el TPV degradaba a
# cola EN SILENCIO. No era una regresion del TPV: al fix le faltaba el DATO.
# Por eso el paso "Publicar en LFS de main" commitea aqui el binario recien
# compilado: es el unico sitio del que el parque descarga.
#
# FIRMA:
#   - Certificado QZ (authcert, confianza sin dialogo): OPCIONAL. Si estan los
#     Secrets QZ_CERT_PEM/QZ_KEY_PEM/QZ_OVERRIDE_CRT se usan; si no, compila sin
#     ellos (el parque ya confia en el cert instalado).
#   - Firma Authenticode del instalador (jsign): si NO se dan Secrets de keystore,
#     ant genera un keystore self-signed automaticamente (find-keystore-self). El
#     .exe sale self-signed: valido para PROBAR el parche con papel (Windows pedira
#     confirmar en la instalacion). Para produccion, define los Secrets de firma.
#
# SECRETS opcionales:
#   QZ_CERT_PEM / QZ_KEY_PEM / QZ_OVERRIDE_CRT  -> certificado de confianza QZ
#   WIN_SIGNING_KEYSTORE_B64                    -> keystore (.p12/.jks) en base64
#   WIN_SIGNING_ALIAS / WIN_SIGNING_STOREPASS   -> alias y passphrase del keystore

name: build-win

on:
  push:
    branches:
      - 'main'
      - 'feat/usb-devicepath-windows'
    paths:
      - 'patches/**'
      - '.github/workflows/build-win.yaml'
      - 'provision-src/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'Adjuntar el .exe a una Release (tag)'
        required: false
        default: ''
      publicar:
        description: 'Commitear qz.exe a LFS de main (es lo que descarga el TPV)'
        type: boolean
        required: false
        default: true

# El paso "Publicar en LFS de main" commitea el binario al repo.
permissions:
  contents: write

env:
  QZ_SOURCE_REPO: https://github.com/qzind/tray
  QZ_SOURCE_REF: 46e404e4d50d92b84ee3a817d29ce0f5225907bb

jobs:
  windows:
    runs-on: windows-latest
    steps:
      # 1) Checkout de ESTE repo (provision-src/ + patches/) en subcarpeta.
      #    lfs:false a proposito: aqui solo se necesitan patches/ y provision-src/,
      #    y bajar los punteros LFS traeria ~220 MB de binarios inutiles para el
      #    build. El paso de publicacion hace su propio checkout de main.
      - uses: actions/checkout@v4
        with:
          path: this-repo
          lfs: false

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'liberica'

      # NSIS: ant lo busca en "C:\Program Files (x86)\NSIS\makensis.exe",
      # que es justo donde lo deja choco.
      - name: Instalar NSIS
        run: choco install nsis -y --no-progress

      # 2) Clonar el fuente de QZ al pin exacto (qzind/tray @ 46e404e).
      - name: Clonar fuente qzind/tray (pin exacto)
        shell: bash
        run: |
          git clone --filter=blob:none "$QZ_SOURCE_REPO" tray
          cd tray
          git checkout "$QZ_SOURCE_REF"
          echo "Fuente en $(git rev-parse --short HEAD)"

      # 2b) Aplicar los CUATRO parches EN ORDEN. Cada uno se genero sobre el anterior,
      #     asi que el orden es obligatorio. Todos son ADITIVOS y su codigo solo se
      #     ACTIVA en runtime bajo su SO (isWindows()/isLinux()), asi que compilan
      #     igual en cualquier runner y el binario no diverge entre plataformas.
      #       0001 win  devicePath/vid/pid por cola y por dispositivo
      #       0002 linux /dev/usb/lpN real + serial (sysfs) + tofile persistente
      #       0003 win  workOffline  -> apagado detectado POR COLA (medido 2026-07-22)
      #       0004 linux printerState + stateReasons (+ media-empty / cover-open)
      - name: Aplicar parches (devicePath 0001/0002 + estado de cola 0003/0004)
        shell: bash
        working-directory: tray
        run: |
          for p in 0001-usb-details-windows-devicepath \
                   0002-usb-details-linux-devicepath \
                   0003-printer-status-workoffline-windows \
                   0004-printer-status-cups-linux; do
            git apply --check "../this-repo/patches/$p.patch"
            git apply        "../this-repo/patches/$p.patch"
            echo "  aplicado: $p"
          done
          echo "Parches 0001+0002+0003+0004 aplicados."

      # 2c) Tests TestNG: WindowsUsbInfoTest / LinuxUsbInfoTest (0001/0002) y
      #     WindowsPrinterStatusTest / LinuxPrinterStatusTest (0003/0004).
      #     El build FALLA si un test cae: el binario no se publica a medias.
      - name: Tests TestNG
        shell: bash
        working-directory: tray
        run: ant unit-tests

      # 3) Copiar el provisioning versionado dentro del arbol tray.
      - name: Colocar provisioning
        shell: bash
        run: |
          mkdir -p tray/provision
          cp this-repo/provision-src/*.ps1 this-repo/provision-src/*.sh this-repo/provision-src/provision.json tray/provision/ 2>/dev/null || true
          ls -la tray/provision/ || true

      # 4) Certificado de confianza QZ (OPCIONAL). Si estan los tres Secrets, se
      #    restauran y se pasa -Dauthcert.use; si no, se compila sin ellos.
      - name: Restaurar certificados de confianza (si hay Secrets)
        id: authcert
        shell: bash
        env:
          QZ_CERT_PEM: ${{ secrets.QZ_CERT_PEM }}
          QZ_KEY_PEM: ${{ secrets.QZ_KEY_PEM }}
          QZ_OVERRIDE_CRT: ${{ secrets.QZ_OVERRIDE_CRT }}
        run: |
          if [ -n "$QZ_CERT_PEM" ] && [ -n "$QZ_KEY_PEM" ] && [ -n "$QZ_OVERRIDE_CRT" ]; then
            printf '%s' "$QZ_CERT_PEM"     > tray/cert.pem
            printf '%s' "$QZ_KEY_PEM"      > tray/key.pem
            printf '%s' "$QZ_OVERRIDE_CRT" > tray/override.crt
            echo "authcert=cert.pem" >> "$GITHUB_OUTPUT"
            echo "Certificado de confianza QZ restaurado."
          else
            echo "authcert=" >> "$GITHUB_OUTPUT"
            echo "Sin Secrets de cert QZ: se compila sin authcert (self / por defecto)."
          fi

      # 4b) Keystore de firma Authenticode (OPCIONAL). Si no hay, ant autogenera
      #     uno self-signed (find-keystore-self) y el .exe sale self-signed.
      - name: Restaurar keystore de firma (si hay Secret)
        id: signkeystore
        shell: bash
        env:
          WIN_SIGNING_KEYSTORE_B64: ${{ secrets.WIN_SIGNING_KEYSTORE_B64 }}
        run: |
          if [ -n "$WIN_SIGNING_KEYSTORE_B64" ]; then
            echo "$WIN_SIGNING_KEYSTORE_B64" | base64 -d > tray/signing.p12
            echo "have=1" >> "$GITHUB_OUTPUT"
            echo "Keystore de firma restaurado."
          else
            echo "have=0" >> "$GITHUB_OUTPUT"
            echo "Sin keystore de firma: el .exe saldra SELF-SIGNED (valido para probar)."
          fi

      # 5) Compilar el instalador .exe (target nsis). Se anaden -Dauthcert.use y
      #    los -Dsigning.* solo cuando hay Secrets; si no, ant usa los defaults
      #    (self-signed) sin fallar.
      - name: Compilar instalador .exe
        shell: bash
        working-directory: tray
        run: |
          # Ruta explicita a makensis.exe: la deteccion de ant (nsisbin-from-64)
          # depende de %ProgramFiles(x86)% y falla en el runner (cae a "makensis"
          # pelado, que no esta en PATH). -Dnsisbin gana sobre la <property>.
          NSIS_EXE="/c/Program Files (x86)/NSIS/makensis.exe"
          if [ ! -f "$NSIS_EXE" ]; then NSIS_EXE="/c/Program Files/NSIS/makensis.exe"; fi
          echo "makensis: $NSIS_EXE"; [ -f "$NSIS_EXE" ] || { echo "::error::makensis.exe no encontrado"; exit 1; }
          NSIS_WIN=$(cygpath -w "$NSIS_EXE")
          # Array para preservar los espacios de la ruta de makensis como UN arg.
          ARGS=(-Dprovision.file=provision/provision.json "-Dnsisbin=$NSIS_WIN")
          if [ -n "${{ steps.authcert.outputs.authcert }}" ]; then
            ARGS+=(-Dauthcert.use=cert.pem)
          fi
          if [ "${{ steps.signkeystore.outputs.have }}" = "1" ]; then
            ARGS+=(-Dsigning.keystore=signing.p12 "-Dsigning.alias=${{ secrets.WIN_SIGNING_ALIAS }}" "-Dsigning.storepass=${{ secrets.WIN_SIGNING_STOREPASS }}")
          fi
          echo "ant nsis ${ARGS[*]}"
          ant nsis "${ARGS[@]}"
          ls -la out/*.exe

      # Nombre FIJO qz.exe: NSIS genera el .exe con la version dentro del nombre
      # (qz-tray-X.Y.Z.exe), asi que la URL de descarga cambiaria en cada
      # release. Renombrando a qz.exe, el enlace
      # .../releases/latest/download/qz.exe es estable y no hay que tocar el TPV
      # al publicar una version nueva.
      - name: Renombrar instalador a qz.exe
        working-directory: tray
        shell: bash
        run: |
          SRC=$(ls out/*.exe | head -1)
          [ -n "$SRC" ] || { echo "::error::no se genero ningun .exe"; exit 1; }
          [ "$SRC" = "out/qz.exe" ] || mv "$SRC" out/qz.exe
          ls -la out/qz.exe

      # No dejar secretos en el workspace.
      - name: Limpiar secretos del workspace
        if: always()
        shell: bash
        run: rm -f tray/cert.pem tray/key.pem tray/override.crt tray/signing.p12

      - name: Subir artefacto (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: qz-tray-windows
          path: tray/out/qz.exe
          if-no-files-found: error

      - name: Adjuntar a Release
        if: ${{ inputs.release != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release }}
          files: tray/out/qz.exe

      # PUBLICACION: commitea qz.exe al LFS de main, que es de donde descarga el
      # TPV (zq/printer-modal.js -> QZ_DL.win). Sin este paso, main se queda con
      # el binario viejo aunque el parche este mergeado: exactamente el fallo del
      # 22-jul. Se hace en un checkout LIMPIO de main para no arrastrar el arbol
      # del build ni sus secretos.
      #
      # Corre en push a main y en dispatch con publicar=true. Nunca en la rama del
      # parche: ahi el binario aun no esta validado.
      #
      # ANTI-BUCLE (doble): este paso pushea a main, la misma rama que dispara el
      # workflow. No se reentra porque (1) el commit solo toca qz.exe, que NO esta
      # en el filtro `paths` de arriba, y (2) GITHUB_TOKEN no dispara workflows por
      # diseño. Si algun dia se añade 'qz.exe' (o '**') a `paths`, esto se convierte
      # en un bucle infinito de builds de Windows. NO lo hagas.
      - name: Publicar en LFS de main
        if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || inputs.publicar) }}
        shell: bash
        run: |
          set -euo pipefail
          # Checkout limpio de main. lfs:false -> no baja los ~220 MB de binarios
          # existentes; para AÑADIR un objeto LFS no hace falta tener los demas.
          git clone --depth 1 --branch main \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" publish
          cd publish
          git lfs install --local

          cp ../tray/out/qz.exe qz.exe

          # Si el binario es identico al de main, no se crea commit vacio.
          if git diff --quiet -- qz.exe; then
            echo "qz.exe no ha cambiado respecto a main: nada que publicar."
            exit 0
          fi

          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add qz.exe

          # Verificacion ANTES de commitear: qz.exe DEBE quedar como puntero LFS.
          # Si .gitattributes fallara, se commitearia un binario de 98 MB al arbol
          # de git (irreversible sin reescribir historia). Preferimos fallar.
          if ! git show ":qz.exe" | head -c 40 | grep -q 'version https://git-lfs'; then
            echo "::error::qz.exe NO quedo como puntero LFS. Abortado para no meter 98 MB en el arbol de git."
            exit 1
          fi

          # Un -m por parrafo: con un unico -m multilinea, la indentacion del
          # bloque YAML se colaria dentro del cuerpo del mensaje. (Y un heredoc a
          # columna 0 romperia el propio `run: |`.)
          git commit \
            -m "build(qz): publica qz.exe compilado en CI desde ${GITHUB_SHA:0:7}" \
            -m "Binario que descarga el TPV (LFS de main). Generado por build-win.yaml. Lleva el parche device path USB (devicePath usbprint + printerClass + ieee1284 en qz.usb.listDevices), imprescindible para el USB directo en Windows: el bus da serial vacio y el numero de serie va dentro del devicePath."
          git push origin main
          echo "qz.exe publicado en LFS de main."
